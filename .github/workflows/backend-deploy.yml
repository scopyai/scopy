name: Backend deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/tools/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}/api"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  trigger-deploy:
    name: Trigger deploy
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    needs:
      - build-and-push
    env:
      DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}
      GITHUB_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Call webhook
        if: ${{ env.DOKPLOY_WEBHOOK_URL != '' }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "X-GitHub-Event: tag" \
            --header "content-type: application/json" \
            --data "{\"ref\":\"refs/heads/${GITHUB_REF_NAME}\"}" \
            "$DOKPLOY_WEBHOOK_URL"

      - name: Skip redeploy
        if: ${{ env.DOKPLOY_WEBHOOK_URL == '' }}
        run: echo "DOKPLOY_BACKEND_WEBHOOK_URL is not configured; image was pushed but redeploy was skipped."
