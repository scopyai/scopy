name: Backend deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: blacksmith-4vcpu-ubuntu-2404

    outputs:
      image: ${{ steps.image.outputs.image }}
      worker-image: ${{ steps.image.outputs.worker-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment branch
        if: github.ref_name != 'main'
        run: |
          echo "Backend deploys must be started from main. Current ref: ${GITHUB_REF_NAME}"
          exit 1

      - name: Resolve image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}/api"
          worker_image="${REGISTRY}/${GITHUB_REPOSITORY,,}/api-worker"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "worker-image=${worker_image}" >> "$GITHUB_OUTPUT"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: apps/api/Dockerfile
          target: api-runner
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}

      - name: Build and push worker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: apps/api/Dockerfile
          target: worker-runner
          push: true
          tags: |
            ${{ steps.image.outputs.worker-image }}:latest
            ${{ steps.image.outputs.worker-image }}:${{ github.sha }}

  trigger-deploy:
    name: Trigger deploy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.ref_name == 'main'
    needs:
      - build-and-push
    env:
      DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}
      DOKPLOY_WORKER_WEBHOOK_URL: ${{ secrets.DOKPLOY_BACKEND_WORKER_WEBHOOK_URL }}
      GITHUB_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Call webhook
        if: ${{ env.DOKPLOY_WEBHOOK_URL != '' }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "X-GitHub-Event: push" \
            --header "content-type: application/json" \
            --data "{\"ref\":\"refs/heads/${GITHUB_REF_NAME}\"}" \
            "$DOKPLOY_WEBHOOK_URL"

      - name: Call worker webhook
        if: ${{ env.DOKPLOY_WORKER_WEBHOOK_URL != '' }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "X-GitHub-Event: push" \
            --header "content-type: application/json" \
            --data "{\"ref\":\"refs/heads/${GITHUB_REF_NAME}\"}" \
            "$DOKPLOY_WORKER_WEBHOOK_URL"

      - name: Skip redeploy
        if: ${{ env.DOKPLOY_WEBHOOK_URL == '' }}
        run: echo "DOKPLOY_BACKEND_WEBHOOK_URL is not configured; image was pushed but redeploy was skipped."

      - name: Skip worker redeploy
        if: ${{ env.DOKPLOY_WORKER_WEBHOOK_URL == '' }}
        run: echo "DOKPLOY_BACKEND_WORKER_WEBHOOK_URL is not configured; worker image was pushed but redeploy was skipped."
