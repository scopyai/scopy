name: Landing Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-landing:
    name: Deploy Landing
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter landing typecheck

      - name: Build
        env:
          VITE_GITHUB_URL: ${{ vars.VITE_LANDING_GITHUB_URL }}
          VITE_APP_URL: ${{ vars.VITE_WEB_BASE_URL }}
          VITE_DOCS_URL: ${{ vars.VITE_LANDING_DOCS_URL }}
          VITE_PRIVACY_URL: ${{ vars.VITE_LANDING_PRIVACY_URL }}
        run: pnpm --filter landing build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing
          command: deploy
